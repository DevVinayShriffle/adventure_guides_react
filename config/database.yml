default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= Rails.application.credentials.pg[:username] %>
  password: <%= Rails.application.credentials.pg[:password] %>
  host: localhost
  port: 5432

development:
  <<: *default
  database: adventure_guides_development

test:
  <<: *default
  database: adventure_guides_test

production:
  primary: &primary_production
    <<: *default
    database: adventure_guides_production
    username: <%= Rails.application.credentials.pg[:username] %>
    password: <%= Rails.application.credentials.pg[:password] %>
  cache:
    <<: *primary_production
    database: adventure_guides_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: adventure_guides_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: adventure_guides_production_cable
    migrations_paths: db/cable_migrate